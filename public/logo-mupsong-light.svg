<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: TV screen (shifted down 7px) -->
  <rect x="32" y="17" width="56" height="42" rx="9" ry="9" stroke="url(#glow)" stroke-width="2.5" fill="none"/>
  <rect x="37" y="22" width="46" height="32" rx="5" ry="5" fill="url(#glow)" opacity="0.08"/>
  <!-- Play triangle -->
  <polygon points="55,31 55,45 67,38" fill="url(#glow)"/>
  <!-- Stand -->
  <rect x="48" y="61" width="24" height="2.5" rx="1.25" fill="#3b82f6" opacity="0.5"/>
  <rect x="52" y="59" width="16" height="3" rx="1" fill="#3b82f6" opacity="0.3"/>
  
  <!-- Signal waves -->
  <path d="M77 25 Q82 20 87 25" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M75 21 Q83 14 91 21" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- Brand text: MUPSONG -->
  <text x="215" y="44" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="3" fill="url(#textGrad)" text-anchor="middle">MUPSONG</text>
  
  <!-- Tagline -->
  <text x="215" y="60" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" letter-spacing="5" fill="#2563eb" opacity="0.9" text-anchor="middle">STREAM BEYOND</text>
</svg>